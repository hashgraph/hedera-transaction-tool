name: Test Frontend

on:
  push:
    branches:
      - main
      - release/**
  pull_request:
    branches:
      - main
      - release/**
  workflow_dispatch:

defaults:
  run:
    shell: bash

permissions:
  contents: read

concurrency:
  group: pr-checks-${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  build:
    name: Build | Front-end
    runs-on: transaction-tools-linux-medium

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@a90bcbc6539c36a85cdfeb73f7e2f433735f215b # v2.15.0
        with:
          egress-policy: audit

      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Node.js
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: 22.12.0
          cache: 'npm'
          cache-dependency-path: |
            front-end/pnpm-lock.yaml

      - name: Install pnpm
        run: npm install -g pnpm@9.15.3

      - name: Install front-end Dependencies
        run: pnpm install --frozen-lockfile
        working-directory: front-end

      - name: Build Linux executable
        run: pnpm run build:linux
        working-directory: front-end

      - name: Cache Build Artifacts
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: front-end/release/linux-unpacked
          key: build-artifacts-${{ github.sha }}

  test:
    name: Automation | ${{ matrix.test-suite.name }}
    runs-on: transaction-tools-linux-medium
    needs: build
    strategy:
      fail-fast: false
      matrix:
        test-suite:
#          - name: Registration
#            command: RegistrationTests
#            soloRequired: false
#          - name: Login
#            command: LoginTests
#            soloRequired: false
#          - name: Settings
#            command: SettingsTests
#            soloRequired: false
#          - name: Transactions
#            command: TransactionTests
#            soloRequired: true
#          - name: Workflow
#            command: WorkflowTests
#            soloRequired: true
          - name: OrganizationGroup
            command: OrganizationGroupTests
            soloRequired: true
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@a90bcbc6539c36a85cdfeb73f7e2f433735f215b # v2.15.0
        with:
          egress-policy: audit

      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Node.js
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: 22.12.0
          cache: 'npm'
          cache-dependency-path: |
            automation/pnpm-lock.yaml

      - name: Install pnpm
        run: npm install -g pnpm@9.15.3

      - name: Install Docker Compose Plugin
        run: |
          sudo curl -fLo /usr/local/lib/docker/cli-plugins/docker-compose https://github.com/docker/compose/releases/download/v2.29.1/docker-compose-linux-x86_64
          sudo chmod +x /usr/local/lib/docker/cli-plugins/docker-compose
          sudo ln -sf /usr/local/lib/docker/cli-plugins/docker-compose /usr/local/bin/docker-compose

      - name: Install Automation Dependencies
        run: pnpm install --frozen-lockfile
        working-directory: automation

      - name: Build | Back-end
        run: |
          set -euo pipefail

          if [ ! -f package.json ] || [ ! -f pnpm-workspace.yaml ]; then
            echo "Expected to run pnpm install from back-end root" >&2
            exit 1
          fi

          pnpm install

          sudo apt-get update
          sudo apt-get install -y libnss3-tools mkcert

          mkdir -p cert
          mkcert -install
          mkcert -key-file ./cert/key.pem -cert-file ./cert/cert.pem localhost

          for directory in apps/api apps/chain apps/notifications . scripts typeorm; do
            if [ -f "${directory}/.example.env" ]; then
              cp "${directory}/.example.env" "${directory}/.env"
            elif [ -f "${directory}/example.env" ]; then
              cp "${directory}/example.env" "${directory}/.env"
            else
              echo "No .example.env or example.env file found in ${directory}" >&2
              exit 1
            fi
          done

          FRONTEND_VERSION="$(node -p "require('../front-end/package.json').version")"
          sed -i "s/^LATEST_SUPPORTED_FRONTEND_VERSION=.*/LATEST_SUPPORTED_FRONTEND_VERSION=${FRONTEND_VERSION}/" apps/api/.env
          sed -i "s/^MINIMUM_SUPPORTED_FRONTEND_VERSION=.*/MINIMUM_SUPPORTED_FRONTEND_VERSION=${FRONTEND_VERSION}/" apps/api/.env
          sed -i "s/^MINIMUM_SUPPORTED_FRONTEND_VERSION=.*/MINIMUM_SUPPORTED_FRONTEND_VERSION=${FRONTEND_VERSION}/" apps/notifications/.env

          if [ ! -f docker-compose.yaml ]; then
            echo "Expected to run docker-compose from back-end root" >&2
            exit 1
          fi

          export COMPOSE_PARALLEL_LIMIT=4

          compose_services=(database nats migration chain notifications api)

          for attempt in $(seq 1 3); do
            if docker-compose up -d "${compose_services[@]}"; then
              break
            fi

            if [ "${attempt}" -eq 3 ]; then
              echo "docker-compose failed after ${attempt} attempts" >&2
              docker-compose ps || true
              docker-compose logs --tail=200 api chain notifications migration database redis nats || true
              exit 1
            fi

            echo "docker-compose up failed on attempt ${attempt}; retrying in 10 seconds..."
            docker-compose down --remove-orphans || true
            sleep 10
          done

          for attempt in $(seq 1 120); do
            status_code="$(curl -ksS -o /dev/null -w '%{http_code}' https://localhost:3001/ || true)"
            if [ "${status_code}" = "200" ] || [ "${status_code}" = "426" ]; then
              echo "Back-end is ready on https://localhost:3001 (HTTP ${status_code})"
              break
            fi

            if [ "${attempt}" -eq 120 ]; then
              echo "Back-end did not become ready in time" >&2
              echo "Last health status code: ${status_code}" >&2
              docker-compose ps
              docker-compose logs --tail=200 api chain notifications migration database redis nats || true
              exit 1
            fi

            sleep 5
          done

          docker-compose ps
        working-directory: back-end

      - name: Setup Kind
        if: ${{ matrix.test-suite.soloRequired }}
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1.14.0
        with:
          install_only: true
          node_image: kindest/node:v1.31.4@sha256:2cb39f7295fe7eafee0842b1052a599a4fb0f8bcf3f83d96c7f4864c357c6c30
          version: v0.26.0
          kubectl_version: v1.31.4
          verbosity: 3
          wait: 120s

      - name: Install Solo CLI
        if: ${{ matrix.test-suite.soloRequired }}
        run: |
          set -euo pipefail
          npm install -g @hashgraph/solo
          solo --version
          kind --version

      - name: Deploy Solo
        if: ${{ matrix.test-suite.soloRequired }}
        id: solo_deploy
        env:
          SOLO_CLUSTER_NAME: solo
          SOLO_NAMESPACE: solo
          SOLO_CLUSTER_SETUP_NAMESPACE: solo-cluster
          SOLO_DEPLOYMENT: solo-deployment
        run: |
          set -euo pipefail
          kind create cluster -n "${SOLO_CLUSTER_NAME}"
          solo one-shot single deploy | tee solo-deploy.log

      - name: Check port forwarding
        if: ${{ matrix.test-suite.soloRequired }}
        run: |
          ps -ef | grep port-forward
          env
          curl -fsS http://localhost:8080/api/v1/network/nodes
          curl -fsS http://localhost:8081/api/v1/network/nodes

      - name: Restore Build Artifacts
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          fail-on-cache-miss: true
          path: front-end/release/linux-unpacked
          key: build-artifacts-${{ github.sha }}

      - name: Install xvfb
        run: sudo apt-get update && sudo apt-get install -y xvfb

      - name: Install Runtime Shared Libraries
        run: sudo apt-get install --no-install-recommends -y xorg openbox libnss3 libasound2 libatk-adaptor libgtk-3-0

      - name: Run Automation
        env:
          EXECUTABLE_PATH: ../front-end/release/linux-unpacked/hedera-transaction-tool
          PRIVATE_KEY: ${{ secrets.SOLO_PRIVATE_KEY }}
          OPERATOR_KEY: ${{ secrets.OPERATOR_KEY }}
          ENVIRONMENT: LOCALNET
          ORGANIZATION_URL: https://localhost:3001
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          POSTGRES_DATABASE: postgres
          POSTGRES_USERNAME: postgres
          POSTGRES_PASSWORD: postgres

        run: xvfb-run -a npx playwright test tests/${{ matrix.test-suite.command }}
        working-directory: automation

      - name: Upload Playwright Report
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.test-suite.name }}
          path: automation/reports/playwright
          if-no-files-found: warn
          retention-days: 14

      - name: Show Back-end logs on failure
        if: ${{ failure() }}
        run: docker-compose logs --tail=300 api chain notifications migration database redis nats
        working-directory: back-end

      - name: Stop Back-end Services
        if: ${{ always() }}
        run: docker-compose down --remove-orphans
        working-directory: back-end

  unit-test:
    name: Unit Tests | ${{ matrix.test-suite.name }}
    runs-on: transaction-tools-linux-medium
    strategy:
      fail-fast: false
      matrix:
        test-suite:
          - name: Main Process
            command: main:coverage
          - name: Renderer Process
            command: renderer
          - name: Shared
            command: shared
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@a90bcbc6539c36a85cdfeb73f7e2f433735f215b # v2.15.0
        with:
          egress-policy: audit

      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Node.js
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: 22.12.0
          cache: 'npm'
          cache-dependency-path: |
            front-end/pnpm-lock.yaml

      - name: Install pnpm
        run: npm install -g pnpm@9.15.3

      - name: Install front-end Dependencies
        run: pnpm install --frozen-lockfile
        working-directory: front-end

      - name: Run Unit Tests
        run: pnpm run test:${{ matrix.test-suite.command }}
        working-directory: front-end

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@5c47607acb93fed5485fdbf7232e8a31425f672a # v5.0.2
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
