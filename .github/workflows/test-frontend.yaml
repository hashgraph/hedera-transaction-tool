name: Test Frontend

on:
  push:
    branches:
      - main
      - release/**
  pull_request:
    branches:
      - main
      - release/**
  workflow_dispatch:

defaults:
  run:
    shell: bash

permissions:
  contents: read

concurrency:
  group: pr-checks-${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

env:
  REMOTE_E2E_SSH_HOST: ${{ vars.REMOTE_E2E_SSH_HOST }}
  REMOTE_E2E_SSH_PORT: ${{ vars.REMOTE_E2E_SSH_PORT || '22' }}
  REMOTE_E2E_SSH_USER: ${{ vars.REMOTE_E2E_SSH_USER }}
  REMOTE_E2E_WORKSPACE_ROOT: ${{ vars.REMOTE_E2E_WORKSPACE_ROOT || '/tmp/hedera-transaction-tool-shared-e2e' }}

jobs:
  build:
    name: Build | Front-end
    runs-on: transaction-tools-linux-medium

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 22.12.0
          cache: 'npm'
          cache-dependency-path: |
            front-end/pnpm-lock.yaml

      - name: Install pnpm
        run: npm install -g pnpm@9.15.3

      - name: Install front-end Dependencies
        run: pnpm install --frozen-lockfile
        working-directory: front-end

      - name: Build Linux executable
        run: pnpm run build:linux
        working-directory: front-end

      - name: Cache Build Artifacts
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: front-end/release/linux-unpacked
          key: build-artifacts-${{ github.sha }}

  test-local-basic:
    name: Automation | Local Basic
    runs-on: transaction-tools-linux-medium
    needs: build
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 22.12.0
          cache: 'npm'
          cache-dependency-path: |
            automation/pnpm-lock.yaml

      - name: Install pnpm
        run: npm install -g pnpm@9.15.3

      - name: Install Automation Dependencies
        run: pnpm install --frozen-lockfile
        working-directory: automation

      - name: Restore Build Artifacts
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          fail-on-cache-miss: true
          path: front-end/release/linux-unpacked
          key: build-artifacts-${{ github.sha }}

      - name: Install xvfb
        run: sudo apt-get update && sudo apt-get install -y xvfb

      - name: Install Runtime Shared Libraries
        run: sudo apt-get install --no-install-recommends -y xorg openbox libnss3 libasound2 libatk-adaptor libgtk-3-0

      - name: Run Automation
        env:
          EXECUTABLE_PATH: ../front-end/release/linux-unpacked/hedera-transaction-tool
          ENVIRONMENT: LOCALNET
          PLAYWRIGHT_SHARED_ENV: 'false'
          PLAYWRIGHT_WORKERS: 1
        run: xvfb-run -a npx playwright test --grep "@local-basic"
        working-directory: automation

      - name: Upload Playwright Report
        if: ${{ always() }}
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report-local-basic
          path: automation/reports/playwright
          if-no-files-found: warn
          retention-days: 3

      - name: Upload Playwright Test Results
        if: ${{ always() }}
        uses: actions/upload-artifact@v7
        with:
          name: playwright-test-results-local-basic
          path: automation/test-results
          if-no-files-found: warn
          retention-days: 3

  provision-shared-e2e-env:
    name: Provision | Shared E2E Environment
    runs-on: transaction-tools-linux-medium
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Configure SSH Access
        env:
          REMOTE_E2E_SSH_PRIVATE_KEY: ${{ secrets.REMOTE_E2E_SSH_PRIVATE_KEY }}
          REMOTE_E2E_SSH_KNOWN_HOSTS: ${{ secrets.REMOTE_E2E_SSH_KNOWN_HOSTS }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${REMOTE_E2E_SSH_PRIVATE_KEY}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

          if [[ -n "${REMOTE_E2E_SSH_KNOWN_HOSTS:-}" ]]; then
            printf '%s\n' "${REMOTE_E2E_SSH_KNOWN_HOSTS}" > ~/.ssh/known_hosts
          else
            ssh-keyscan -p "${REMOTE_E2E_SSH_PORT}" "${REMOTE_E2E_SSH_HOST}" > ~/.ssh/known_hosts
          fi

          chmod 644 ~/.ssh/known_hosts

      - name: Provision Remote Shared E2E Environment
        env:
          REMOTE_E2E_ENV_ID: shared-e2e-${{ github.run_id }}
          REMOTE_E2E_METADATA_PATH: ${{ runner.temp }}/shared-e2e-env.json
        run: .github/scripts/remote-shared-e2e.sh provision

      - name: Upload Shared E2E Metadata
        uses: actions/upload-artifact@v7
        with:
          name: shared-e2e-metadata-${{ github.run_id }}
          path: ${{ runner.temp }}/shared-e2e-env.json
          if-no-files-found: error
          retention-days: 3

  shared-e2e-test:
    name: Automation | ${{ matrix.test-suite.name }}
    runs-on: transaction-tools-linux-medium
    needs:
      - build
      - provision-shared-e2e-env
    strategy:
      fail-fast: false
      matrix:
        test-suite:
          - name: Local Transactions
            grep: '@local-transactions'
            workers: 2
          - name: Organization Basic
            grep: '@organization-basic'
            workers: 2
          - name: Organization Advanced
            grep: '@organization-advanced'
            workers: 3
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 22.12.0
          cache: 'npm'
          cache-dependency-path: |
            automation/pnpm-lock.yaml

      - name: Install pnpm
        run: npm install -g pnpm@9.15.3

      - name: Install Automation Dependencies
        run: pnpm install --frozen-lockfile
        working-directory: automation

      - name: Restore Build Artifacts
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          fail-on-cache-miss: true
          path: front-end/release/linux-unpacked
          key: build-artifacts-${{ github.sha }}

      - name: Download Shared E2E Metadata
        uses: actions/download-artifact@v4
        with:
          name: shared-e2e-metadata-${{ github.run_id }}
          path: ${{ runner.temp }}

      - name: Configure SSH Access
        env:
          REMOTE_E2E_SSH_PRIVATE_KEY: ${{ secrets.REMOTE_E2E_SSH_PRIVATE_KEY }}
          REMOTE_E2E_SSH_KNOWN_HOSTS: ${{ secrets.REMOTE_E2E_SSH_KNOWN_HOSTS }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${REMOTE_E2E_SSH_PRIVATE_KEY}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

          if [[ -n "${REMOTE_E2E_SSH_KNOWN_HOSTS:-}" ]]; then
            printf '%s\n' "${REMOTE_E2E_SSH_KNOWN_HOSTS}" > ~/.ssh/known_hosts
          else
            ssh-keyscan -p "${REMOTE_E2E_SSH_PORT}" "${REMOTE_E2E_SSH_HOST}" > ~/.ssh/known_hosts
          fi

          chmod 644 ~/.ssh/known_hosts

      - name: Ensure Shared E2E Environment
        env:
          REMOTE_E2E_ENV_ID: shared-e2e-${{ github.run_id }}
          REMOTE_E2E_METADATA_PATH: ${{ runner.temp }}/shared-e2e-env.json
        run: .github/scripts/remote-shared-e2e.sh ensure

      - name: Open Shared E2E Tunnels
        env:
          REMOTE_E2E_ENV_ID: shared-e2e-${{ github.run_id }}
          REMOTE_E2E_METADATA_PATH: ${{ runner.temp }}/shared-e2e-env.json
          REMOTE_E2E_TUNNEL_SOCKET: ${{ runner.temp }}/shared-e2e-${{ github.run_id }}.sock
        run: .github/scripts/remote-shared-e2e.sh open-tunnels

      - name: Install xvfb
        run: sudo apt-get update && sudo apt-get install -y xvfb

      - name: Install Runtime Shared Libraries
        run: sudo apt-get install --no-install-recommends -y xorg openbox libnss3 libasound2 libatk-adaptor libgtk-3-0

      - name: Run Automation
        env:
          EXECUTABLE_PATH: ../front-end/release/linux-unpacked/hedera-transaction-tool
          ENVIRONMENT: LOCALNET
          PLAYWRIGHT_SHARED_ENV: 'true'
          PLAYWRIGHT_WORKERS: ${{ matrix.test-suite.workers }}
          ORGANIZATION_URL: https://localhost:3001
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          POSTGRES_DATABASE: postgres
          POSTGRES_USERNAME: postgres
          POSTGRES_PASSWORD: postgres
        run: xvfb-run -a npx playwright test --grep "${{ matrix.test-suite.grep }}"
        working-directory: automation

      - name: Collect Remote Diagnostics
        if: ${{ failure() }}
        env:
          REMOTE_E2E_ENV_ID: shared-e2e-${{ github.run_id }}
          REMOTE_E2E_DIAGNOSTICS_PATH: ${{ runner.temp }}/shared-e2e-diagnostics-${{ matrix.test-suite.name }}.tgz
        run: .github/scripts/remote-shared-e2e.sh collect-diagnostics

      - name: Upload Remote Diagnostics
        if: ${{ failure() }}
        uses: actions/upload-artifact@v7
        with:
          name: shared-e2e-diagnostics-${{ matrix.test-suite.name }}
          path: ${{ runner.temp }}/shared-e2e-diagnostics-${{ matrix.test-suite.name }}.tgz
          if-no-files-found: warn
          retention-days: 3

      - name: Upload Playwright Report
        if: ${{ always() }}
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report-${{ matrix.test-suite.name }}
          path: automation/reports/playwright
          if-no-files-found: warn
          retention-days: 3

      - name: Upload Playwright Test Results
        if: ${{ always() }}
        uses: actions/upload-artifact@v7
        with:
          name: playwright-test-results-${{ matrix.test-suite.name }}
          path: automation/test-results
          if-no-files-found: warn
          retention-days: 3

      - name: Close Shared E2E Tunnels
        if: ${{ always() }}
        env:
          REMOTE_E2E_ENV_ID: shared-e2e-${{ github.run_id }}
          REMOTE_E2E_TUNNEL_SOCKET: ${{ runner.temp }}/shared-e2e-${{ github.run_id }}.sock
        run: .github/scripts/remote-shared-e2e.sh close-tunnels

  cleanup-shared-e2e-env:
    name: Cleanup | Shared E2E Environment
    runs-on: transaction-tools-linux-medium
    if: ${{ always() }}
    needs:
      - provision-shared-e2e-env
      - shared-e2e-test
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Configure SSH Access
        env:
          REMOTE_E2E_SSH_PRIVATE_KEY: ${{ secrets.REMOTE_E2E_SSH_PRIVATE_KEY }}
          REMOTE_E2E_SSH_KNOWN_HOSTS: ${{ secrets.REMOTE_E2E_SSH_KNOWN_HOSTS }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${REMOTE_E2E_SSH_PRIVATE_KEY}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

          if [[ -n "${REMOTE_E2E_SSH_KNOWN_HOSTS:-}" ]]; then
            printf '%s\n' "${REMOTE_E2E_SSH_KNOWN_HOSTS}" > ~/.ssh/known_hosts
          else
            ssh-keyscan -p "${REMOTE_E2E_SSH_PORT}" "${REMOTE_E2E_SSH_HOST}" > ~/.ssh/known_hosts
          fi

          chmod 644 ~/.ssh/known_hosts

      - name: Cleanup Remote Shared E2E Environment
        env:
          REMOTE_E2E_ENV_ID: shared-e2e-${{ github.run_id }}
        run: .github/scripts/remote-shared-e2e.sh cleanup

  unit-test:
    name: Unit Tests | ${{ matrix.test-suite.name }}
    runs-on: transaction-tools-linux-medium
    strategy:
      fail-fast: false
      matrix:
        test-suite:
          - name: Main Process
            command: main:coverage
          - name: Renderer Process
            command: renderer
          - name: Shared
            command: shared

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 22.12.0
          cache: 'npm'
          cache-dependency-path: |
            front-end/pnpm-lock.yaml

      - name: Install pnpm
        run: npm install -g pnpm@9.15.3

      - name: Install front-end Dependencies
        run: pnpm install --frozen-lockfile
        working-directory: front-end

      - name: Run Unit Tests
        run: pnpm run test:${{ matrix.test-suite.command }}
        working-directory: front-end

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@5c47607acb93fed5485fdbf7232e8a31425f672a # v5.0.2
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
