name: macOS Smoke Test

# Validates the signing and notarization pipeline against any branch, tag, or
# commit without creating a release. Use this to confirm secrets/certs are
# working before cutting a release, or to debug electron-builder config changes.

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch, tag, or commit SHA to build from"
        required: false
        default: main

defaults:
  run:
    shell: bash

env:
  LC_ALL: C.UTF-8

jobs:
  smoke_test_mac:
    name: macOS Smoke Test
    runs-on: macos-latest
    timeout-minutes: 90

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout Repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.ref || 'main' }}
          token: ${{ secrets.HEDERA_BOT_TOKEN }}

      - name: Install pnpm
        uses: step-security/action-setup@7734f5522f614a4cf2820ad19aa26717c7abfd96 # v6.0.9

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
          node-version-file: package.json

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.13"

      - name: Prepare App Store Connect API Key
        run: |
          API_KEY_PATH="${RUNNER_TEMP}/apple_api_key.p8"
          echo "${{ secrets.APPLE_API_KEY_BASE64 }}" | base64 --decode > "${API_KEY_PATH}"
          echo "APPLE_API_KEY=${API_KEY_PATH}" >> "$GITHUB_ENV"

      - name: Verify Apple Notarization Credentials
        env:
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        run: |
          xcrun notarytool history \
            --key "${APPLE_API_KEY}" \
            --key-id "${APPLE_API_KEY_ID}" \
            --issuer "${APPLE_API_ISSUER}"

      - name: Install Dependencies
        working-directory: front-end
        run: pnpm install --frozen-lockfile

      - name: Build and Sign macOS Artifacts
        working-directory: front-end
        env:
          CSC_LINK: ${{ secrets.MACOS_CERT_APP_BASE64 }}
          CSC_KEY_PASSWORD: ${{ secrets.MACOS_CERT_APP_PASSWORD }}
          CSC_INSTALLER_LINK: ${{ secrets.MACOS_CERT_INSTALLER_BASE64 }}
          CSC_INSTALLER_KEY_PASSWORD: ${{ secrets.MACOS_CERT_INSTALLER_PASSWORD }}
        run: pnpm run build && pnpm exec electron-builder --mac --publish=never

      - name: Notarize and Staple Installers
        env:
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        run: bash .github/scripts/notarize-mac-installers.sh

      - name: Upload macOS Artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: smoke-test-macos-artifacts
          path: |
            front-end/release/*.dmg
            front-end/release/*.pkg
            front-end/release/*.zip
            front-end/release/*.blockmap
            front-end/release/latest-mac.yml
          if-no-files-found: error
          retention-days: 3
