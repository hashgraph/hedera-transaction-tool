# SPDX-License-Identifier: Apache-2.0

name: macOS Smoke Test

# Validates the signing and notarization pipeline against any branch, tag, or
# commit without creating a release. Use this to confirm secrets/certs are
# working before cutting a release, or to debug electron-builder config changes.

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch, tag, or commit SHA to build from"
        required: false
        default: main

defaults:
  run:
    shell: bash

env:
  LC_ALL: C.UTF-8

jobs:
  smoke_test_mac:
    name: macOS Smoke Test
    runs-on: macos-latest
    timeout-minutes: 90

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout Repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ inputs.ref || 'main' }}
          token: ${{ secrets.HEDERA_BOT_TOKEN }}

      - name: Install pnpm
        uses: step-security/action-setup@0ad50dc56a23060fa78b14cfcf0677c4e14b42bc # v5.0.0
        with:
          version: 9.15.3

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24.15.0

      - name: Get pnpm store directory
        id: pnpm-store
        run: echo "path=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"

      - name: Install Dependencies
        working-directory: front-end
        run: pnpm install --frozen-lockfile

      - name: Build and Sign macOS Artifacts
        working-directory: front-end
        env:
          CSC_LINK: ${{ secrets.MACOS_CERT_APP_BASE64 }}
          CSC_KEY_PASSWORD: ${{ secrets.MACOS_CERT_APP_PASSWORD }}
          CSC_INSTALLER_LINK: ${{ secrets.MACOS_CERT_INSTALLER_BASE64 }}
          CSC_INSTALLER_KEY_PASSWORD: ${{ secrets.MACOS_CERT_INSTALLER_PASSWORD }}
        run: pnpm run build && pnpm exec electron-builder --mac --publish=never

      - name: Prepare App Store Connect API Key
        run: |
          API_KEY_PATH="${RUNNER_TEMP}/apple_api_key.p8"
          echo "${{ secrets.APPLE_API_KEY_BASE64 }}" | base64 --decode > "${API_KEY_PATH}"
          echo "APPLE_API_KEY=${API_KEY_PATH}" >> "$GITHUB_ENV"

      - name: Notarize and Staple Installers
        working-directory: front-end
        env:
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        run: bash scripts/notarize-mac-installers.sh

      - name: Upload macOS Artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: smoke-test-macos-artifacts
          path: |
            front-end/release/*.dmg
            front-end/release/*.pkg
            front-end/release/*.zip
            front-end/release/*.blockmap
            front-end/release/latest-mac.yml
          if-no-files-found: error
          retention-days: 3
