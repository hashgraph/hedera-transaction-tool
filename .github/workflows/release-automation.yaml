# SPDX-License-Identifier: Apache-2.0

name: Release Automation

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version (semver)"
        required: true

permissions:
  contents: write
  pull-requests: write
  issues: write

defaults:
  run:
    shell: bash

env:
  LC_ALL: C.UTF-8

jobs:
  # ----------------------------
  # Parse the input version once and share the derived values with every
  # downstream job via outputs (jobs don't share $GITHUB_ENV or a checkout).
  # ----------------------------
  prepare:
    name: Prepare Release Metadata
    runs-on: transaction-tools-linux-medium
    outputs:
      version: ${{ steps.meta.outputs.version }}
      release_tag: ${{ steps.meta.outputs.release_tag }}
      release_branch: ${{ steps.meta.outputs.release_branch }}
      next_version_snapshot: ${{ steps.meta.outputs.next_version_snapshot }}
      release: ${{ steps.version_parser.outputs.release }}
      prerelease: ${{ steps.version_parser.outputs.prerelease }}

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Parse Version
        id: version_parser
        uses: step-security/semver-utils@5bb182a08240146b23b61cc002cb74004377da4b # v5.0.0
        with:
          lenient: false
          version: ${{ github.event.inputs.version }}

      - name: Compute Release Metadata
        id: meta
        run: |
          PREMINOR_VERSION=${{ steps.version_parser.outputs.inc-preminor }}
          NEXT_VERSION_SNAPSHOT=${PREMINOR_VERSION//-0/-SNAPSHOT}
          RELEASE_BRANCH="release/${{ steps.version_parser.outputs.major }}.${{ steps.version_parser.outputs.minor }}"
          [[ -z "${{ steps.version_parser.outputs.prerelease }}" ]] && \
            VERSION=${{ steps.version_parser.outputs.release }} || \
            VERSION="${{ steps.version_parser.outputs.release }}-${{ steps.version_parser.outputs.prerelease }}"
          RELEASE_TAG="v${VERSION}"

          cat >> "$GITHUB_OUTPUT" <<EOF
          version=$VERSION
          release_tag=$RELEASE_TAG
          release_branch=$RELEASE_BRANCH
          next_version_snapshot=$NEXT_VERSION_SNAPSHOT
          EOF

  # ----------------------------
  # Create the release branch, bump versions, regenerate the NOTICE/lockfiles,
  # then commit + tag. This MUST run before the images are built so the images
  # are built from source that already contains the release version (the api
  # embeds package.json `version` into its Swagger docs at build time).
  # ----------------------------
  cut_release:
    name: Branch, Bump and Tag
    runs-on: transaction-tools-linux-medium
    needs: prepare
    env:
      VERSION: ${{ needs.prepare.outputs.version }}
      RELEASE_BRANCH: ${{ needs.prepare.outputs.release_branch }}
      RELEASE_TAG: ${{ needs.prepare.outputs.release_tag }}
      NEXT_VERSION_SNAPSHOT: ${{ needs.prepare.outputs.next_version_snapshot }}
    outputs:
      create_pr: ${{ steps.branch_or_create_release.outputs.create_pr }}
      pr_title: ${{ steps.branch_or_create_release.outputs.pr_title }}

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout Repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          ref: main
          token: ${{ secrets.HEDERA_BOT_TOKEN }}

      - name: Import GPG Key
        id: gpg_importer
        uses: step-security/ghaction-import-gpg@c0b4a334b9b72bfaaebec86ef022a78a5b17f828 # v7.0.0
        with:
          git_commit_gpgsign: true
          git_committer_email: ${{ vars.GIT_USER_EMAIL }}
          git_committer_name: ${{ vars.GIT_USER_NAME }}
          git_tag_gpgsign: true
          git_user_signingkey: true
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.GPG_PASSPHRASE }}

      - name: Install pnpm
        uses: step-security/action-setup@0ad50dc56a23060fa78b14cfcf0677c4e14b42bc # v5.0.0
        with:
          version: 9.15.3

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24.15.0

      - name: Create and Switch to Release Branch
        id: branch_or_create_release
        run: |
          if ! git ls-remote --exit-code --heads --quiet origin refs/heads/${RELEASE_BRANCH}; then
            git checkout -b ${RELEASE_BRANCH}
            git push -u origin ${RELEASE_BRANCH}

            # Create a PR to bump main branch to the next snapshot version
            echo "create_pr=true" >> "$GITHUB_OUTPUT"
            echo "pr_title=chore: update package versions to v$NEXT_VERSION_SNAPSHOT" >> "$GITHUB_OUTPUT"
          else
            git checkout ${RELEASE_BRANCH}
          fi

      - name: Bump Versions
        run: |
          npm pkg set version=${{ env.VERSION }} --prefix back-end
          npm pkg set version=${{ env.VERSION }} --prefix back-end/apps/api
          npm pkg set version=${{ env.VERSION }} --prefix back-end/apps/chain
          npm pkg set version=${{ env.VERSION }} --prefix back-end/apps/notifications
          npm pkg set version=${{ env.VERSION }} --prefix back-end/typeorm
          npm pkg set version=${{ env.VERSION }} --prefix front-end
          npm pkg set version=${{ env.VERSION }} --prefix automation

      - name: Update Lockfiles
        run: |
          pnpm install --dir back-end
          pnpm install --dir front-end
          pnpm install --dir automation

      - name: Generate NOTICE File
        if: ${{ needs.prepare.outputs.prerelease == '' }}
        run: node notice-gen/index.js

      - name: Check Tag Exists
        run: |
          if git ls-remote --tags --exit-code origin refs/tags/${RELEASE_TAG}; then
            echo "TAG_EXISTS=true" >> $GITHUB_ENV
          else
            echo "TAG_EXISTS=false" >> $GITHUB_ENV
          fi

      - name: Commit and Tag
        if: ${{ env.TAG_EXISTS == 'false' }}
        uses: step-security/git-auto-commit-action@749bc1cc775376092cc4227ba537137f445ca7c3 # v7.1.1
        with:
          commit_author: ${{ steps.gpg_importer.outputs.name }} <${{ steps.gpg_importer.outputs.email }}>
          commit_message: "chore: bump versions for ${{ env.RELEASE_TAG }} [skip ci]"
          commit_options: "--no-verify --signoff"
          commit_user_name: ${{ steps.gpg_importer.outputs.name }}
          commit_user_email: ${{ steps.gpg_importer.outputs.email }}
          tagging_message: ${{ env.RELEASE_TAG }}

  # ----------------------------
  # Docker Auth + Buildx + Cache
  # Always builds from the release tag created by cut_release.
  # ----------------------------
  build_and_push_images:
    name: Build and Push Docker Images
    runs-on: transaction-tools-linux-medium
    timeout-minutes: 30
    needs: [prepare, cut_release]
    # Override the workflow-level permissions: the attestation step needs to mint
    # an OIDC token and write the provenance attestation, and the push needs
    # packages: write. contents: read is enough for the checkout.
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: api
            dockerfile: back-end/apps/api/Dockerfile
          - image: chain
            dockerfile: back-end/apps/chain/Dockerfile
          - image: notifications
            dockerfile: back-end/apps/notifications/Dockerfile
          - image: migration
            dockerfile: back-end/typeorm/Dockerfile
    env:
      REGISTRY: ghcr.io/hashgraph/hedera-transaction-tool
      VERSION: ${{ needs.prepare.outputs.version }}

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout Repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Always build from the immutable release tag for the supplied version
          # so the image is pinned to the exact tagged commit (the api embeds
          # package.json `version` at build time). cut_release creates this tag
          # just before this job runs.
          ref: ${{ needs.prepare.outputs.release_tag }}
          token: ${{ secrets.HEDERA_BOT_TOKEN }}

      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        # Required so build-push-action gets a docker-container (buildkit) builder;
        # the default docker driver cannot export the gha cache.
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ${{ env.REGISTRY }}/${{ matrix.image }}
          tags: type=raw,value=${{ env.VERSION }}

      - name: Build and Push Docker Image
        id: push
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}
          # build-push-action emits its own SLSA provenance by default (the
          # source of the "unknown/unknown" entries on the GHCR package page).
          # Disable it so the dedicated attest step below is the single source
          # of provenance, wired into GitHub's attestation UI.
          provenance: false

      - name: Generate artifact attestation
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
        with:
          subject-name: ${{ env.REGISTRY }}/${{ matrix.image }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

  # ----------------------------
  # Build the macOS desktop artifacts (dmg, pkg, zip, latest-mac.yml and the
  # accompanying blockmaps) with electron-builder on a macOS runner. Always
  # builds from the immutable release tag created by cut_release. Runs in
  # parallel with build_and_push_images. The artifacts are signed (Developer ID
  # Application for the app/dmg/zip, Developer ID Installer for the pkg), then
  # the dmg/pkg installers are notarized + stapled inline. Artifacts are
  # uploaded to GitHub Actions storage; the github_release job attaches them to
  # the GitHub Release. Use the smoke-test-mac workflow to validate the
  # signing/notarization pipeline outside of a full release.
  # ----------------------------
  build_mac:
    name: Build macOS Artifacts
    runs-on: macos-latest
    # Generous: three arches (x64/arm64/universal) are built, then six
    # installers (dmg + pkg per arch) are notarized via the notary service.
    timeout-minutes: 90
    needs: [prepare, cut_release]
    env:
      VERSION: ${{ needs.prepare.outputs.version }}

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout Repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Build from the immutable release tag for the supplied version so the
          # version electron-builder bundles matches the tagged commit (same
          # rationale as build_and_push_images).
          ref: ${{ needs.prepare.outputs.release_tag }}
          token: ${{ secrets.HEDERA_BOT_TOKEN }}

      - name: Install pnpm
        uses: step-security/action-setup@0ad50dc56a23060fa78b14cfcf0677c4e14b42bc # v5.0.0
        with:
          version: 9.15.3

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24.15.0

      - name: Get pnpm store directory
        id: pnpm-store
        run: echo "path=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"

      - name: Install Dependencies
        # front-end postinstall (electron-builder install-app-deps) rebuilds
        # native modules for the macOS electron runtime.
        working-directory: front-end
        run: pnpm install --frozen-lockfile

      - name: Build and Sign macOS Artifacts
        working-directory: front-end
        # Builds and signs only — notarization is the explicit step below.
        # --publish=never prevents electron-builder from auto-publishing in CI;
        # artifacts are uploaded via upload-artifact.
        env:
          # Developer ID Application cert (signs the .app, .dmg and .zip).
          # CSC_LINK accepts the base64-encoded .p12 directly.
          CSC_LINK: ${{ secrets.MACOS_CERT_APP_BASE64 }}
          CSC_KEY_PASSWORD: ${{ secrets.MACOS_CERT_APP_PASSWORD }}
          # Developer ID Installer cert (signs the .pkg).
          CSC_INSTALLER_LINK: ${{ secrets.MACOS_CERT_INSTALLER_BASE64 }}
          CSC_INSTALLER_KEY_PASSWORD: ${{ secrets.MACOS_CERT_INSTALLER_PASSWORD }}
        run: pnpm run build && pnpm exec electron-builder --mac --publish=never

      - name: Prepare App Store Connect API Key
        # notarytool needs the App Store Connect API key as a .p8 file on disk;
        # the secret holds it base64-encoded. Write it to the runner temp dir
        # and export its path for the notarization step.
        run: |
          API_KEY_PATH="${RUNNER_TEMP}/apple_api_key.p8"
          echo "${{ secrets.APPLE_API_KEY_BASE64 }}" | base64 --decode > "${API_KEY_PATH}"
          echo "APPLE_API_KEY=${API_KEY_PATH}" >> "$GITHUB_ENV"

      - name: Notarize and Staple Installers
        # APPLE_API_KEY (.p8 path) is exported into $GITHUB_ENV by the prior step.
        env:
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        run: bash .github/scripts/notarize-mac-installers.sh

      - name: Upload macOS Artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: macos-artifacts-${{ env.VERSION }}
          path: |
            front-end/release/*.dmg
            front-end/release/*.pkg
            front-end/release/*.zip
            front-end/release/*.zip.blockmap
            front-end/release/latest-mac.yml
          if-no-files-found: error
          retention-days: 5

  # ----------------------------
  # Close the milestone, attach macOS artifacts, and publish the GitHub release.
  # ----------------------------
  github_release:
    name: Publish GitHub Release
    runs-on: transaction-tools-linux-medium
    needs: [prepare, cut_release, build_and_push_images, build_mac]
    env:
      RELEASE_BRANCH: ${{ needs.prepare.outputs.release_branch }}
      RELEASE_TAG: ${{ needs.prepare.outputs.release_tag }}

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout Repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          ref: ${{ needs.prepare.outputs.release_branch }}
          token: ${{ secrets.HEDERA_BOT_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24.15.0

      - name: Close the Milestone
        if: ${{ needs.prepare.outputs.prerelease == '' }}
        continue-on-error: true
        uses: step-security/close-milestone@d6e3b63e31f1f869bd3d0403f8cdc1a68f59ab4a # v2.2.2
        with:
          milestone_name: v${{ needs.prepare.outputs.release }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set Release Body
        if: ${{ needs.prepare.outputs.prerelease == '' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git fetch --tags
          PREV_TAG=$(git tag | grep -v "^${RELEASE_TAG}$" | grep -v -- '-' | sort -V | tail -1)
          RAW_NOTES=$(gh api repos/${{ github.repository }}/releases/generate-notes \
            -f tag_name="${RELEASE_TAG}" \
            -f previous_tag_name="${PREV_TAG}" \
            --jq '.body')

          RELEASE_BODY=$(echo "$RAW_NOTES" | node .github/scripts/sort-release-notes.mjs)

          echo "RELEASE_BODY<<EOF" >> $GITHUB_ENV
          echo "$RELEASE_BODY" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Create GitHub Release
        uses: step-security/release-action@a0d8e0f90f554c15366ca2c9046bf4090d24adbe # v1.21.0
        with:
          body: ${{ env.RELEASE_BODY }}
          commit: ${{ env.RELEASE_BRANCH }}
          draft: true
          name: ${{ env.RELEASE_TAG }}
          prerelease: ${{ needs.prepare.outputs.prerelease != '' }}
          skipIfReleaseExists: true
          tag: ${{ env.RELEASE_TAG }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check Release Is Draft
        id: release_state
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          IS_DRAFT=$(gh release view "$RELEASE_TAG" \
            --repo ${{ github.repository }} \
            --json isDraft \
            --jq '.isDraft')
          echo "is_draft=$IS_DRAFT" >> $GITHUB_OUTPUT
          if [[ "$IS_DRAFT" != "true" ]]; then
            echo "Release is already published — skipping artifact upload"
          fi

      - name: Download macOS Artifacts
        if: ${{ steps.release_state.outputs.is_draft == 'true' }}
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: macos-artifacts-${{ needs.prepare.outputs.version }}
          path: macos-artifacts

      - name: Upload macOS Artifacts to Release
        if: ${{ steps.release_state.outputs.is_draft == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload ${{ env.RELEASE_TAG }} macos-artifacts/* \
            --repo ${{ github.repository }} --clobber

      - name: Publish Pre-Release
        if: ${{ needs.prepare.outputs.prerelease != '' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release edit ${{ env.RELEASE_TAG }} \
            --draft=false \
            --prerelease \
            --repo ${{ github.repository }}


  # ----------------------------
  # Create or update the release tracking issue. Runs in parallel with
  # create_snapshot_pr so a flaky GitHub API call cannot block the snapshot PR.
  # ----------------------------
  create_tracking_issue:
    name: Create or Update Release Tracking Issue
    runs-on: transaction-tools-linux-medium
    needs: [prepare, cut_release, github_release]

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout Repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.prepare.outputs.release_branch }}
          token: ${{ secrets.HEDERA_BOT_TOKEN }}

      - name: Create or Update Release Tracking Issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.prepare.outputs.version }}
          RELEASE_VERSION: ${{ needs.prepare.outputs.release }}
          PRERELEASE: ${{ needs.prepare.outputs.prerelease }}
          NEXT_VERSION_SNAPSHOT: ${{ needs.prepare.outputs.next_version_snapshot }}
          CREATE_PR: ${{ needs.cut_release.outputs.create_pr }}
        run: |
          ISSUE_TITLE="v${RELEASE_VERSION} Release Task"
          MILESTONE="v${RELEASE_VERSION}"

          # Use the milestone only if it already exists in the repo.
          MILESTONE_NUMBER=$(gh api repos/${{ github.repository }}/milestones \
            --jq ".[] | select(.title == \"${MILESTONE}\") | .number" 2>/dev/null | head -1)
          MILESTONE_ARGS=()
          [ -n "$MILESTONE_NUMBER" ] && MILESTONE_ARGS=(--milestone "$MILESTONE")

          EXISTING=$(gh issue list \
            --repo ${{ github.repository }} \
            --state open \
            --search "\"${ISSUE_TITLE}\" in:title" \
            --json number,title \
            --jq ".[] | select(.title == \"${ISSUE_TITLE}\") | .number" \
            | head -1)

          if [ -n "$EXISTING" ]; then
            if [ -n "$PRERELEASE" ]; then
              # Update the beta version reference in the pre-requisites.
              gh issue view "$EXISTING" \
                --repo ${{ github.repository }} \
                --json body --jq '.body' \
                | sed "s|Beta \`v${RELEASE_VERSION}-beta\.[0-9][0-9]*\`|Beta \`v${VERSION}\`|g" \
                | jq -Rs '{body: .}' \
                | gh api repos/${{ github.repository }}/issues/${EXISTING} \
                    -X PATCH --input -

              # Mark the existing checklist comment as superseded and post a fresh one.
              CHECKLIST_COMMENT_ID=$(gh api \
                repos/${{ github.repository }}/issues/${EXISTING}/comments \
                --jq '[.[] | select(.body | startswith("## Release Testing Checklist"))] | last | .id // empty')
              if [ -n "$CHECKLIST_COMMENT_ID" ]; then
                SUPERSEDED_BODY=$(gh api \
                  repos/${{ github.repository }}/issues/comments/${CHECKLIST_COMMENT_ID} \
                  --jq '.body')
                (printf '> [!NOTE]\n> Superseded by **v%s** — see updated checklist below.\n\n' "${VERSION}"; \
                 printf '%s' "${SUPERSEDED_BODY}") \
                  | jq -Rs '{body: .}' \
                  | gh api repos/${{ github.repository }}/issues/comments/${CHECKLIST_COMMENT_ID} \
                      -X PATCH --input -
              fi

              gh issue comment "$EXISTING" \
                --body "$(cat docs/release-testing-checklist.md)" \
                --repo ${{ github.repository }}
            else
              gh issue comment "$EXISTING" \
                --body "Release Automation completed for **v${VERSION}**. The automated steps are done — proceed with the Publish Release and Final deployment checklists." \
                --repo ${{ github.repository }}
            fi
          else
            if [ -n "$PRERELEASE" ]; then
              ISSUE_BODY=$(sed \
                  -e "s|<major\.minor\.patch>-beta\.<number>|${VERSION}|g" \
                  -e "s|<major\.minor\.patch>|${RELEASE_VERSION}|g" \
                  docs/release-process.md)
            else
              ISSUE_BODY=$(sed \
                  -e "s|<major\.minor\.patch>|${VERSION}|g" \
                  docs/release-process.md)
            fi

            # Substitute or remove the SNAPSHOT bump PR line.
            if [ "$CREATE_PR" = "true" ]; then
              ISSUE_BODY=$(echo "$ISSUE_BODY" | sed \
                "s|<!-- snapshot-bump-pr-line -->|- [ ] Review and merge the \`v${NEXT_VERSION_SNAPSHOT}\` bump PR to \`main\`|g")
            else
              ISSUE_BODY=$(echo "$ISSUE_BODY" | sed "/<!-- snapshot-bump-pr-line -->/d")
            fi
            ISSUE_URL=$(gh issue create \
              --title "$ISSUE_TITLE" \
              --body "$ISSUE_BODY" \
              --label "release" \
              "${MILESTONE_ARGS[@]}" \
              --repo ${{ github.repository }})

            ISSUE_NUMBER="${ISSUE_URL##*/}"
            gh issue comment "$ISSUE_NUMBER" \
              --body "$(cat docs/release-testing-checklist.md)" \
              --repo ${{ github.repository }}
          fi

  create_snapshot_pr:
    name: Create Snapshot Bump PR
    runs-on: transaction-tools-linux-medium
    needs: [prepare, cut_release, github_release]
    if: ${{ needs.cut_release.outputs.create_pr == 'true' && needs.github_release.result == 'success' }}
    env:
      NEXT_VERSION_SNAPSHOT: ${{ needs.prepare.outputs.next_version_snapshot }}
      RELEASE_BRANCH: ${{ needs.prepare.outputs.release_branch }}

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout Repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: main
          token: ${{ secrets.HEDERA_BOT_TOKEN }}

      - name: Import GPG Key
        id: gpg_importer
        uses: step-security/ghaction-import-gpg@c0b4a334b9b72bfaaebec86ef022a78a5b17f828 # v7.0.0
        with:
          git_commit_gpgsign: true
          git_committer_email: ${{ vars.GIT_USER_EMAIL }}
          git_committer_name: ${{ vars.GIT_USER_NAME }}
          git_tag_gpgsign: true
          git_user_signingkey: true
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.GPG_PASSPHRASE }}

      - name: Reset main to release branch
        run: |
          git fetch origin $RELEASE_BRANCH:$RELEASE_BRANCH
          git reset --hard $RELEASE_BRANCH

      - name: Install pnpm
        uses: step-security/action-setup@0ad50dc56a23060fa78b14cfcf0677c4e14b42bc # v5.0.0
        with:
          version: 9.15.3

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24.15.0

      - name: Bump to Next Snapshot Version
        run: |
          npm pkg set version=${{ env.NEXT_VERSION_SNAPSHOT }} --prefix back-end
          npm pkg set version=${{ env.NEXT_VERSION_SNAPSHOT }} --prefix back-end/apps/api
          npm pkg set version=${{ env.NEXT_VERSION_SNAPSHOT }} --prefix back-end/apps/chain
          npm pkg set version=${{ env.NEXT_VERSION_SNAPSHOT }} --prefix back-end/apps/notifications
          npm pkg set version=${{ env.NEXT_VERSION_SNAPSHOT }} --prefix back-end/typeorm
          npm pkg set version=${{ env.NEXT_VERSION_SNAPSHOT }} --prefix front-end
          npm pkg set version=${{ env.NEXT_VERSION_SNAPSHOT }} --prefix automation

      - name: Update Lockfiles
        run: |
          pnpm install --dir back-end
          pnpm install --dir front-end
          pnpm install --dir automation

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          author: ${{ steps.gpg_importer.outputs.name }} <${{ steps.gpg_importer.outputs.email }}>
          body: Bump versions for v${{ env.NEXT_VERSION_SNAPSHOT }}
          branch: create-pull-request/${{ env.RELEASE_BRANCH }}
          commit-message: "Bump versions for v${{ env.NEXT_VERSION_SNAPSHOT }} [skip ci]"
          committer: ${{ steps.gpg_importer.outputs.name }} <${{ steps.gpg_importer.outputs.email }}>
          delete-branch: true
          signoff: true
          title: ${{ needs.cut_release.outputs.pr_title }}
          token: ${{ secrets.HEDERA_BOT_TOKEN }}
