# Build context is the repo root: the Dockerfiles need the root pnpm-lock.yaml,
# pnpm-workspace.yaml, and the front-end/automation package manifests. The Cloud
# Build trigger must be configured to use the repository root as its source
# (not back-end/).
steps:
  # API service
  - name: 'gcr.io/cloud-builders/docker'
    args:
      [
        'build',
        '-t',
        'gcr.io/transaction-tool-dev/api',
        '-f',
        'back-end/apps/api/Dockerfile',
        '.'
      ]
  - name: 'gcr.io/cloud-builders/docker'
    args:
      ['push', 'gcr.io/transaction-tool-dev/api']
  # Chain service
  - name: 'gcr.io/cloud-builders/docker'
    args:
      [
        'build',
        '-t',
        'gcr.io/transaction-tool-dev/chain',
        '-f',
        'back-end/apps/chain/Dockerfile',
        '.'
      ]
  - name: 'gcr.io/cloud-builders/docker'
    args:
      ['push', 'gcr.io/transaction-tool-dev/chain']
  # Notifications service
  - name: 'gcr.io/cloud-builders/docker'
    args:
      [
        'build',
        '-t',
        'gcr.io/transaction-tool-dev/notifications',
        '-f',
        'back-end/apps/notifications/Dockerfile',
        '.'
      ]
  - name: 'gcr.io/cloud-builders/docker'
    args:
      ['push', 'gcr.io/transaction-tool-dev/notifications']
