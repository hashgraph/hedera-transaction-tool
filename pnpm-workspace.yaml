virtualStoreDirMaxLength: 60
shamefullyHoist: true
trustLockfile: true

packages:
  - back-end
  - back-end/apps/*
  - back-end/typeorm
  - front-end
  - automation

allowBuilds:
  '@nestjs/core': true
  '@parcel/watcher': true
  '@prisma/client': true
  '@prisma/engines': true
  '@scarf/scarf': true
  argon2: true
  bcrypt: true
  better-sqlite3: true
  cpu-features: true
  electron: true
  electron-winstaller: true
  esbuild: true
  msgpackr-extract: true
  prisma: true
  protobufjs: true
  sqlite3: true
  ssh2: true
  unrs-resolver: true
  vue-demi: true

catalog:
  '@hiero-ledger/proto': 2.31.0
  '@hiero-ledger/sdk': 2.86.2
  '@types/bcrypt': 6.0.0
  '@types/jest': 30.0.0
  '@types/node': 26.1.1
  '@types/semver': 7.7.1
  argon2: 0.44.0
  axios: 1.18.1
  bcrypt: 6.0.0
  bcryptjs: 3.0.3
  dotenv: 17.4.2
  jest: 30.4.2
  jszip: 3.10.1
  long: 5.3.2
  pg: 8.22.0
  prettier: 3.8.3
  reflect-metadata: 0.2.2
  semver: 7.8.5
  ts-jest: 29.4.11
  ts-loader: 9.5.7
  ts-node: 10.9.2
  typeorm: 0.3.31
  typescript: 5.9.3

catalogs:
  # @nestjs/* packages from the nest monorepo (nestjs/nest) ship together and
  # always share a version. The YAML anchor (&nestjsCore / *nestjsCore) keeps
  # the version literal in one place — change it once on Nest upgrades.
  # Do NOT add independently-versioned packages here (e.g. @nestjs/jwt,
  # @nestjs/passport, @nestjs/config, @nestjs/swagger) — their version match
  # is coincidental.
  nestjs-core:
    '@nestjs/common': &nestjsCore 11.1.28
    '@nestjs/core': *nestjsCore
    '@nestjs/microservices': *nestjsCore
    '@nestjs/platform-express': *nestjsCore
    '@nestjs/platform-socket.io': *nestjsCore
    '@nestjs/testing': *nestjsCore
    '@nestjs/websockets': *nestjsCore

  # testcontainers/* packages ship together and always share a version.
  testcontainers:
    testcontainers: &testcontainersVersion 11.14.0
    '@testcontainers/postgresql': *testcontainersVersion
    '@testcontainers/rabbitmq': *testcontainersVersion
    '@testcontainers/redis': *testcontainersVersion

  # vitest/* packages ship together and always share a version.
  vitest:
    vitest: &vitestVersion 4.1.5
    '@vitest/coverage-v8': *vitestVersion

overrides:
  "protobufjs@<8.0.0": "7.6.5"
  "protobufjs@>=8.0.0": "8.7.1"
  "follow-redirects": "1.16.0"
