packages:
  - back-end
  - back-end/apps/*
  - back-end/typeorm
  - front-end
  - automation

catalog:
  '@hiero-ledger/proto': 2.30.0
  '@hiero-ledger/sdk': 2.84.0
  '@types/bcrypt': 6.0.0
  '@types/jest': 30.0.0
  '@types/node': 25.5.0
  '@types/semver': 7.7.1
  argon2: 0.44.0
  axios: 1.16.0
  bcrypt: 6.0.0
  bcryptjs: 3.0.3
  dotenv: 17.4.2
  jest: 30.3.0
  jszip: 3.10.1
  long: 5.3.2
  pg: 8.20.0
  prettier: 3.8.3
  reflect-metadata: 0.2.2
  semver: 7.8.0
  ts-jest: 29.4.6
  ts-loader: 9.5.7
  ts-node: 10.9.2
  typeorm: 0.3.28
  typescript: 6.0.3

catalogs:
  # @nestjs/* packages from the nest monorepo (nestjs/nest) ship together and
  # always share a version. The YAML anchor (&nestjsCore / *nestjsCore) keeps
  # the version literal in one place — change it once on Nest upgrades.
  # Do NOT add independently-versioned packages here (e.g. @nestjs/jwt,
  # @nestjs/passport, @nestjs/config, @nestjs/swagger) — their version match
  # is coincidental.
  nestjs-core:
    '@nestjs/common': &nestjsCore 11.1.19
    '@nestjs/core': *nestjsCore
    '@nestjs/microservices': *nestjsCore
    '@nestjs/platform-express': *nestjsCore
    '@nestjs/platform-socket.io': *nestjsCore
    '@nestjs/testing': *nestjsCore
    '@nestjs/websockets': *nestjsCore

onlyBuiltDependencies:
  - '@nestjs/core'
  - '@parcel/watcher'
  - '@prisma/client'
  - '@prisma/engines'
  - '@scarf/scarf'
  - argon2
  - bcrypt
  - better-sqlite3
  - cpu-features
  - electron
  - esbuild
  - msgpackr-extract
  - prisma
  - protobufjs
  - sqlite3
  - ssh2
  - unrs-resolver
  - vue-demi
