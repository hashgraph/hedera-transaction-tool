appId: com.hiero.transactiontool.app
productName: Hedera Transaction Tool
# Hardcoded artifact prefix (was `${name}`); decoupled from package.json#name so
# the npm package can be renamed (e.g. `front-end`) without changing release
# filenames consumed by electron-updater (see src/main/services/update.ts).
artifactName: hedera-transaction-tool-${version}-${os}-${arch}.${ext}
protocols:
  name: Hedera Transaction Tool
  schemes:
    - hedera-transaction-tool
directories:
  buildResources: build
  output: 'release'
files:
  - 'dist/**'
  - 'dist-electron/**'
  - 'package.json'
  - '!**/test/**'
  - '!**/tests/**'
  - '!**/*.evts'
  - '!**/*.map'
  - '!**/*.d.ts'
  - '!**/node_modules/**/{README,CHANGELOG,CONTRIBUTING,LICENSE}*'
  - '!**/node_modules/**/.{eslintrc,prettierrc,editorconfig,npmignore}'
asarUnpack:
  - '**/*.node'
extraResources:
  - from: src/generated/prisma
    to: src/generated/prisma
  - prisma/schema.prisma
  - prisma/migrations/**
win:
  executableName: ${productName}
nsis:
  shortcutName: ${productName}
  uninstallDisplayName: ${productName}
  createDesktopShortcut: always
mac:
  notarize: false
  target:
    - target: 'default'
      arch:
        - x64
        - arm64
        - universal
    - target: 'pkg'
      arch:
        - x64
        - arm64
        - universal
  mergeASARs: false
linux:
  # Pin the linux-unpacked binary name so it doesn't follow package.json#name.
  # The npm package was renamed `front-end` (workspace ergonomics), but downstream
  # consumers — CI EXECUTABLE_PATH, snap packaging, desktop shortcuts — still expect
  # the historical `hedera-transaction-tool` binary.
  executableName: hedera-transaction-tool
  target:
    - snap
pkg:
  # overwrite the app without strictly requiring the same identifier
  hasStrictIdentifier: false
  # force the app to be installed in /Applications, not overwriting in any other location
  isRelocatable: false
  scripts: pkg-scripts
  mustClose:
    - com.hiero.transactiontool.app
publish:
  provider: github
  # Explicitly set repository owner and name for GitHub Releases
  # This ensures electron-builder knows where to publish releases
  owner: hashgraph
  repo: hedera-transaction-tool
